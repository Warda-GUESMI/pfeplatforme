# Application
spring.application.name=PFETracker-Module3
server.port=8080

# Database SQLite
spring.datasource.url=jdbc:sqlite:pfetracker.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA - Configuration SQLite
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Désactiver les séquences (SQLite ne supporte pas les séquences standard)
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Tunis

# Email (configure selon ton SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pfetracker@univ.tn
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# JWT
jwt.secret=pfetracker-module3-super-secret-key-change-in-production-2024
jwt.expiration=900000
jwt.refresh-expiration=604800000

# WebSocket
websocket.endpoint=/ws
websocket.allowed-origins=*

# Logging
logging.level.com.pfetracker=INFO
logging.level.org.springframework.web.socket=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Pagination
pagination.default-size=20
pagination.max-size=100
