spring:
  application:
    name: pfetracker-module3

  datasource:
    url: jdbc:postgresql://localhost:5432/pfetracker
    username: ${DB_USERNAME:pfetracker}
    password: ${DB_PASSWORD:pfetracker}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    tls: true
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:pfetracker-secret-key-module3-communication-reunion-dashboard-2024}
  expiration: 900000  # 15 minutes

websocket:
  endpoint: /ws
  allowed-origins: "*"

logging:
  level:
    com.pfetracker.module3: DEBUG
    org.springframework.web.socket: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
